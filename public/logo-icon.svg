<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="gold-rad" cx="50%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#fff3c0"/>
      <stop offset="35%" stop-color="#e0bc5e"/>
      <stop offset="70%" stop-color="#b8902b"/>
      <stop offset="100%" stop-color="#73591f"/>
    </radialGradient>
    <linearGradient id="gold-lin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fbe7a0"/>
      <stop offset="50%" stop-color="#d4a73a"/>
      <stop offset="100%" stop-color="#73591f"/>
    </linearGradient>
  </defs>

  <!-- Crown (above circle) -->
  <g transform="translate(60, 18)">
    <!-- Crown band -->
    <rect x="-14" y="6" width="28" height="4" rx="1" fill="url(#gold-lin)" stroke="#52401a" stroke-width="0.5"/>
    <!-- 3 points -->
    <polygon points="-14,6 -10,-4 -6,6" fill="url(#gold-lin)" stroke="#52401a" stroke-width="0.5"/>
    <polygon points="-6,6 0,-8 6,6"     fill="url(#gold-lin)" stroke="#52401a" stroke-width="0.5"/>
    <polygon points="6,6 10,-4 14,6"    fill="url(#gold-lin)" stroke="#52401a" stroke-width="0.5"/>
    <!-- Tiny tip jewels -->
    <circle cx="-10" cy="-4" r="1.4" fill="#fff3c0"/>
    <circle cx="0"   cy="-8" r="1.6" fill="#fff3c0"/>
    <circle cx="10"  cy="-4" r="1.4" fill="#fff3c0"/>
  </g>

  <!-- Gold circle medallion -->
  <circle cx="60" cy="64" r="38" fill="url(#gold-rad)" stroke="#52401a" stroke-width="1.5"/>
  <circle cx="60" cy="64" r="32" fill="none" stroke="#52401a" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.5"/>

  <!-- AJ monogram (overlapping A + J triangular form) -->
  <g transform="translate(60, 64)" fill="none" stroke="#3a2806" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- A (triangle) -->
    <path d="M -16 12 L -4 -14 L 8 12 M -11 4 L 3 4"/>
    <!-- J (overlapping right) -->
    <path d="M 14 -14 L 14 6 Q 14 14 6 14 Q -2 14 -2 6" />
  </g>
</svg>
